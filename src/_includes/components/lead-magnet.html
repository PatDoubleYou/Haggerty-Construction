             <div class="rounded overflow-hidden shadow-lg border border-secondary bg-dark p-4 p-md-5 text-start lead-magnet-card" style="margin-top: -2rem;">
                 <h4 class="text-white fw-bold mb-3">{{ title | default("Download a Free Example") }}</h4>
                 <p class="text-muted small mb-4">{{ description | default("See exactly what you get before you sign anything. Enter your email to receive our 12-page Example Estimate and Project Success Plan.") }}</p>
                 <form name="lead-magnet" data-netlify="true" method="POST">
                     <input type="hidden" name="form-name" value="lead-magnet" />
                     <div class="mb-3">
                         <input type="email" class="form-control form-control-lg bg-transparent text-white border-secondary" name="email" placeholder="Your Email Address" required>
                     </div>
                     <div class="form-check mb-4">
                         <input class="form-check-input border-secondary bg-transparent" type="checkbox" id="marketingConsent" name="marketing_consent" required>
                         <label class="form-check-label text-muted small" for="marketingConsent">
                             I agree to receive occasional construction tips and updates from Haggerty Construction.
                         </label>
                     </div>
                     <button type="submit" class="btn btn-primary w-100 btn-lg shadow">{{ buttonText | default("Send Me the PDF") }}</button>
                 </form>
             </div>
